<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="./lights-out.css" />
  <link rel="stylesheet" href="./../../global.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Play lights out</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fontawesome5-fullcss@1.1.0/css/all.min.css">
  <script type="module" src="./lights-out.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/axios-minified@1.0.7/dist/axios.min.js"></script>


</head>

<body>
  <div id="navigation"></div>
  <div id="main">
    <div id="game">
      <div id="hud">
        <p>Turn on the lights! But careful, once you click a button, the adjacent buttons will also switch!</p>
        <span class="magenta">Moves:{{moves}}</span>
        <span class="aqua">Time:{{formattedTime}}</span>
        <span class="magenta">Best moves:{{bestMoves}}</span>
        <span class="aqua">Best time:{{formatTime(bestTime)}}</span>
        <button class="btn" @click="this.reset()">Reset</button>
      </div>
      <div id='flippable'>
        <div class='row' v-for="(row, rowIndex) in this.buttons"><button v-for="(item, columnIndex) in row"
            :id="item.x + ',' + item.y" @click="this.pressButton(item)" :class="item.state">

          </button>
        </div>
      </div>
      <div id="size-control"><label class="yellow" for="dimension">Size </label><input id="dimension" class="yellow"
          type="number" v-model="size" max="7" min="3"></input></div>
      <dialog id="dialog" :open="this.won">
        <h2>You won! 🎉</h2>
        <p>
          <span class="badge badge-accent-2">{{ moves }} moves</span> <span class="badge badge-accent-4">{{
            formattedTime }} min</span>
        </p>
        <p>Now go do something with your life!</p>
        <button class="btn" @click="close">close</button>
      </dialog>

    </div>
  </div>
</body>

</html>
